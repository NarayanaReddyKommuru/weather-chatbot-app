<main class="app-shell">
  <section class="chat-panel" aria-label="Weather chatbot">
    <header class="chat-header">
      <div>
        <p class="eyebrow">Angular chatbot</p>
        <h1>Weather Chat</h1>
      </div>
      <span class="status">{{ status }}</span>
    </header>

    <div class="messages" aria-live="polite">
      <article *ngFor="let message of messages" class="message" [class.bot]="message.sender === 'bot'" [class.user]="message.sender === 'user'">
        <div class="avatar">{{ message.sender === 'bot' ? 'W' : 'Y' }}</div>
        <p>{{ message.text }}</p>
      </article>
    </div>

    <form class="composer" (ngSubmit)="sendMessage()">
      <input
        name="prompt"
        [(ngModel)]="prompt"
        [disabled]="isBusy"
        autocomplete="off"
        placeholder="Ask: what's the weather in London?"
        aria-label="Message"
      >
      <button type="submit" [disabled]="isBusy">Send</button>
    </form>
  </section>
</main>
